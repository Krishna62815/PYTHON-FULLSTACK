<!DOCTYPE html>
<html lang="en">
<head>
    <title>selectors</title>
    <style>
        h1 ~ p {
            color: green;
        }
        #s,#a{
            color: red;
        }
        h1 + p {
            color: blue;
        }
    </style>
</head>
<body>
    <h1>MAXI</h1>
   <p id ="S">THIS IS MAXI</p>
   <p>THIS IS MAXI</p>
   <p id ="a">THIS IS MAXI</p>
   <p>THIS IS MAXI</p> 
</body>
</html>
